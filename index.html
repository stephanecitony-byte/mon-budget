<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Budget">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mon Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --accent: #c8b89a;
    --green: #4ade80;
    --green-bg: #0e2a19;
    --red: #f87171;
    --red-bg: #2a0e0e;
    --amber: #fbbf24;
    --amber-bg: #2a1e04;
    --blue: #60a5fa;
    --blue-bg: #0e1e2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 90px; padding-top: env(safe-area-inset-top); }

  .header { padding: 2rem 1.25rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; }
  .reset-btn { background: var(--red-bg); border: 1px solid var(--red); border-radius: 99px; padding: 8px 18px; font-size: 13px; color: var(--red); font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; }
  .reset-btn:active { opacity: 0.7; }

  .weekly-wrap { padding: 0 1.25rem 1.5rem; }
  .weekly-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .weekly-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .weekly-amounts { font-size: 13px; color: var(--muted); }
  .weekly-amounts strong { color: var(--text); font-weight: 500; }
  .big-remaining { font-family: 'DM Serif Display', serif; font-size: 3.2rem; font-weight: 400; line-height: 1; margin-bottom: 10px; transition: color 0.3s; }
  .progress-track { width: 100%; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease, background 0.3s; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); padding: 0 1.25rem; margin-bottom: 0.75rem; }

  .wallets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 1.25rem 1.5rem; }
  .wallet-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden; }
  .wallet-card.selected { border-color: var(--accent); background: #1e1b17; }
  .wallet-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .wallet-card.cash::before { background: var(--green); }
  .wallet-card.evo::before { background: var(--blue); }
  .wallet-card.bank::before { background: var(--amber); }
  .wallet-card.amex::before { background: var(--red); }
  .wallet-icon { font-size: 22px; margin-bottom: 8px; }
  .wallet-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
  .wallet-amount { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-weight: 400; }
  .wallet-card.cash .wallet-amount { color: var(--green); }
  .wallet-card.evo .wallet-amount { color: var(--blue); }
  .wallet-card.bank .wallet-amount { color: var(--amber); }
  .wallet-card.amex .wallet-amount { color: var(--red); }

  .quick-section { padding: 0 1.25rem 1.5rem; }
  .quick-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.75rem; }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 8px 16px; font-size: 13px; color: var(--accent); font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s, transform 0.15s; white-space: nowrap; }
  .quick-btn:active { opacity: 0.7; transform: scale(0.96); }

  .divider { height: 1px; background: var(--border); margin: 0 1.25rem 1.25rem; }

  .tx-list { padding: 0 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .tx-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0.85rem 1rem; display: flex; align-items: center; gap: 12px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tx-dot.cash { background: var(--green); }
  .tx-dot.evo { background: var(--blue); }
  .tx-dot.bank { background: var(--amber); }
  .tx-dot.amex { background: var(--red); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tx-amt { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--red); flex-shrink: 0; }
  .tx-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 4px; }

  .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

  .fab { position: fixed; bottom: calc(1.5rem + env(safe-area-inset-bottom)); right: 1.25rem; width: 58px; height: 58px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #0f0f0f; border: none; cursor: pointer; box-shadow: 0 4px 24px rgba(200,184,154,0.25); transition: transform 0.15s; z-index: 100; }
  .fab:active { transform: scale(0.9); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet { background: var(--surface); border-radius: 24px 24px 0 0; padding: 1.25rem 1.25rem calc(2.5rem + env(safe-area-inset-bottom)); width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .overlay.open .sheet { transform: translateY(0); }
  .handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 1.25rem; }
  .sheet h2 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; font-weight: 400; margin-bottom: 1.25rem; }

  .fg { margin-bottom: 1rem; }
  .fg label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); display: block; margin-bottom: 6px; }
  .fg input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 16px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }
  .fg input:focus { border-color: var(--accent); }

  .wallet-pick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .wp-btn { padding: 10px 4px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; text-align: center; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .wp-btn .wp-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .wp-btn.sel-cash { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .wp-btn.sel-evo { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
  .wp-btn.sel-bank { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .wp-btn.sel-amex { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .add-btn { width: 100%; padding: 0.9rem; background: var(--accent); color: #0f0f0f; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .add-btn:active { opacity: 0.85; }
</style>
</head>
<body>

<div class="header">
  <h1>Mon Budget</h1>
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
</div>

<div class="weekly-wrap">
  <div class="weekly-header">
    <span class="weekly-label">Budget semaine</span>
    <span class="weekly-amounts"><strong id="spentAmt">0,00 $</strong> / 100 $</span>
  </div>
  <div class="big-remaining" id="remainingAmt">100,00 $</div>
  <div class="progress-track">
    <div class="progress-fill" id="progressBar" style="width:0%; background:var(--green)"></div>
  </div>
</div>

<div class="section-label">Portefeuilles — appuie pour filtrer</div>
<div class="wallets">
  <div class="wallet-card cash" id="wc-cash" onclick="selectWallet('cash')">
    <div class="wallet-icon">💵</div>
    <div class="wallet-name">Cash</div>
    <div class="wallet-amount" id="wa-cash">0,00 $</div>
  </div>
  <div class="wallet-card evo" id="wc-evo" onclick="selectWallet('evo')">
    <div class="wallet-icon">🚗</div>
    <div class="wallet-name">Evo</div>
    <div class="wallet-amount" id="wa-evo">0,00 $</div>
  </div>
  <div class="wallet-card bank" id="wc-bank" onclick="selectWallet('bank')">
    <div class="wallet-icon">🏦</div>
    <div class="wallet-name">Carte bancaire</div>
    <div class="wallet-amount" id="wa-bank">0,00 $</div>
  </div>
  <div class="wallet-card amex" id="wc-amex" onclick="selectWallet('amex')">
    <div class="wallet-icon">💳</div>
    <div class="wallet-name">Amex</div>
    <div class="wallet-amount" id="wa-amex">0,00 $</div>
  </div>
</div>

<div class="quick-section">
  <div class="quick-title">Ajout rapide</div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickAdd('cash', 50, 'Retrait cash')">💵 Retrait 50 $</button>
    <button class="quick-btn" onclick="quickAdd('cash', 20, 'Cash')">💵 Cash 20 $</button>
    <button class="quick-btn" onclick="quickAdd('evo', 50, 'Evo')">🚗 Evo 50 $</button>
    <button class="quick-btn" onclick="quickAdd('amex', 50, 'Amex')">💳 Amex 50 $</button>
  </div>
</div>

<div class="divider"></div>
<div class="section-label">Transactions</div>
<div class="tx-list" id="txList"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="overlay" id="overlay" onclick="closeOutside(event)">
  <div class="sheet">
    <div class="handle"></div>
    <h2>Ajouter une dépense</h2>
    <div class="fg">
      <label>Portefeuille</label>
      <div class="wallet-pick">
        <button class="wp-btn sel-cash" id="wp-cash" onclick="setWallet('cash')"><span class="wp-icon">💵</span>Cash</button>
        <button class="wp-btn" id="wp-evo" onclick="setWallet('evo')"><span class="wp-icon">🚗</span>Evo</button>
        <button class="wp-btn" id="wp-bank" onclick="setWallet('bank')"><span class="wp-icon">🏦</span>Banque</button>
        <button class="wp-btn" id="wp-amex" onclick="setWallet('amex')"><span class="wp-icon">💳</span>Amex</button>
      </div>
    </div>
    <div class="fg">
      <label>Description</label>
      <input type="text" id="inDesc" placeholder="Ex: Tim Hortons" autocomplete="off">
    </div>
    <div class="fg">
      <label>Montant ($)</label>
      <input type="number" id="inAmt" placeholder="0.00" inputmode="decimal" step="0.01">
    </div>
    <button class="add-btn" onclick="addTx()">Ajouter</button>
  </div>
</div>

<script>
  const BUDGET = 100;
  const WALLETS = {
    cash: { label: 'Cash', icon: '💵' },
    evo:  { label: 'Evo',  icon: '🚗' },
    bank: { label: 'Carte bancaire', icon: '🏦' },
    amex: { label: 'Amex', icon: '💳' }
  };

  let state = JSON.parse(localStorage.getItem('monbudget_v3') || 'null') || { transactions: [] };
  let selectedWallet = 'cash';
  let highlightedWallet = null;

  function fmt(n) {
    return Math.abs(n).toLocaleString('fr-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' $';
  }

  function save() { localStorage.setItem('monbudget_v3', JSON.stringify(state)); }

  function resetAll() {
    if (!confirm('Remettre à zéro toutes les dépenses ?')) return;
    state.transactions = [];
    highlightedWallet = null;
    save(); render();
  }

  function selectWallet(w) {
    highlightedWallet = highlightedWallet === w ? null : w;
    render();
  }

  function setWallet(w) {
    selectedWallet = w;
    ['cash','evo','bank','amex'].forEach(k => {
      document.getElementById('wp-' + k).className = 'wp-btn' + (k === w ? ' sel-' + k : '');
    });
  }

  function quickAdd(wallet, amount, desc) {
    state.transactions.unshift({ id: Date.now(), wallet, amount, desc });
    save(); render();
  }

  function addTx() {
    const desc = document.getElementById('inDesc').value.trim() || WALLETS[selectedWallet].label;
    const amount = parseFloat(document.getElementById('inAmt').value);
    if (isNaN(amount) || amount <= 0) { alert('Entre un montant valide.'); return; }
    state.transactions.unshift({ id: Date.now(), wallet: selectedWallet, amount, desc });
    save(); render(); closeModal();
    document.getElementById('inDesc').value = '';
    document.getElementById('inAmt').value = '';
  }

  function deleteTx(id) {
    state.transactions = state.transactions.filter(t => t.id !== id);
    save(); render();
  }

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('inDesc').focus(), 350);
  }
  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function closeOutside(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function render() {
    const totals = { cash: 0, evo: 0, bank: 0, amex: 0 };
    let spent = 0;
    state.transactions.forEach(t => { totals[t.wallet] += t.amount; spent += t.amount; });

    const remaining = BUDGET - spent;
    const pct = Math.min(100, (spent / BUDGET) * 100);

    document.getElementById('spentAmt').textContent = fmt(spent);

    const remEl = document.getElementById('remainingAmt');
    remEl.textContent = (remaining < 0 ? '−' : '') + fmt(Math.abs(remaining));
    remEl.style.color = remaining < 0 ? 'var(--red)' : remaining < 20 ? 'var(--amber)' : 'var(--green)';

    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.style.background = pct >= 100 ? 'var(--red)' : pct >= 75 ? 'var(--amber)' : 'var(--green)';

    ['cash','evo','bank','amex'].forEach(w => {
      document.getElementById('wa-' + w).textContent = fmt(totals[w]);
      document.getElementById('wc-' + w).classList.toggle('selected', highlightedWallet === w);
    });

    let txs = state.transactions;
    if (highlightedWallet) txs = txs.filter(t => t.wallet === highlightedWallet);

    const list = document.getElementById('txList');
    if (txs.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">👆</div>' +
        (highlightedWallet ? 'Aucune dépense ici.' : 'Aucune dépense pour le moment.') + '</div>';
      return;
    }
    list.innerHTML = txs.map(t => `
      <div class="tx-item">
        <div class="tx-dot ${t.wallet}"></div>
        <div class="tx-info">
          <div class="tx-desc">${t.desc}</div>
          <div class="tx-meta">${WALLETS[t.wallet].icon} ${WALLETS[t.wallet].label}</div>
        </div>
        <div class="tx-amt">−${fmt(t.amount)}</div>
        <button class="tx-del" onclick="deleteTx(${t.id})">✕</button>
      </div>
    `).join('');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  render();
</script>
</body>
</html>
